name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust-checks:
    name: Rust (fmt + lint + features)
    runs-on: ubuntu-latest
    # +aes makes the ahash crate select its AES-NI hasher so the variant
    # registers as [aes-ext]. Without it, ahash falls back to [sw] and the
    # `verify` step diverges from results files generated on machines with
    # target_feature=aes enabled.
    env:
      RUSTFLAGS: "-C target-feature=+aes"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-10-17
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check compilation
        run: cargo check --all-targets
      - name: Build minimal feature set
        run: cargo build --no-default-features --features sha2
      # Release-build the binary and confirm the hand-rolled SHA-1 sha-ext
      # path actually emits SHA-NI opcodes. Catches regressions where a future
      # refactor silently replaces the intrinsics with a generic fallback.
      - name: Verify SHA-NI opcodes present in release binary
        run: |
          cargo build --release --bin hash-bench
          if ! objdump -d target/release/hash-bench \
              | grep -Eq '\b(sha1rnds4|sha1nexte|sha1msg1|sha1msg2)\b'; then
            echo "::error::SHA-NI opcodes missing from target/release/hash-bench — the sha-ext path was likely lost"
            exit 1
          fi
          objdump -d target/release/hash-bench \
            | grep -E '\b(sha1rnds4|sha1nexte|sha1msg1|sha1msg2)\b' \
            | head -n 4
      - name: Verify algorithms.json is up to date
        run: |
          cargo run --quiet -- metadata --output web/src/data/algorithms.json
          git diff --exit-code web/src/data/algorithms.json \
            || (echo "::error::web/src/data/algorithms.json is stale — run \`just gen-metadata\`" && exit 1)
      - name: Verify results completeness
        run: cargo run --quiet -- verify

  web-checks:
    name: Web (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: cd web && bun install --frozen-lockfile
      - name: Biome check
        run: cd web && bunx biome check src/
      - name: Process benchmark results (schema validation)
        run: cd web && bun run prebuild
      - name: TypeScript typecheck
        run: cd web && tsc -b --noEmit
