name: Mobile

# The Tauri mobile wrapper lives under mobile/ and is independent of the desktop
# crate, so it only builds when something under mobile/ changes.
on:
  push:
    branches: [master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [master]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: cd mobile && bun install --frozen-lockfile
      - name: Biome check
        run: cd mobile && bunx biome check src/
      - name: TypeScript typecheck
        run: cd mobile && tsc -b --noEmit

  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-10-17
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile/src-tauri -> target
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend dependencies
        run: cd mobile && bun install --frozen-lockfile
      - name: Initialize Android project
        run: cd mobile && bun run tauri android init --ci
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Build Android APK
        run: cd mobile && bun run tauri android build --apk
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: warn

  ios:
    name: iOS build (experimental)
    runs-on: macos-latest
    # tauri-action's mobile/iOS path is experimental and full archiving needs
    # Apple signing; this job validates that the Rust stack cross-compiles for
    # iOS (simulator target) and is allowed to fail without blocking PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-10-17
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mobile/src-tauri -> target
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend dependencies
        run: cd mobile && bun install --frozen-lockfile
      - name: Build frontend (needed by generate_context!)
        run: cd mobile && bun run build
      - name: Cross-compile Rust core for the iOS simulator
        run: cargo build --manifest-path mobile/src-tauri/Cargo.toml --lib --target aarch64-apple-ios-sim
