pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt -- --check
    rust-lint:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
    web-check:
      root: "web/"
      glob: "src/**/*.{ts,tsx}"
      run: bunx biome check {staged_files}
